<!--
  Briefly — 1280x800 Chrome Web Store hero image.
  Export to PNG with: rsvg-convert hero.svg -w 1280 -h 800 > hero.png
  Or open in Figma / Pixelmator / a browser screenshot for the final PNG.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#1a2236"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f7cff"/>
      <stop offset="100%" stop-color="#a06aff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- glow accents -->
  <circle cx="200" cy="180" r="240" fill="#4f7cff" opacity="0.18" filter="url(#glow)"/>
  <circle cx="1100" cy="660" r="260" fill="#a06aff" opacity="0.16" filter="url(#glow)"/>

  <!-- left: copy -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" fill="#e6e9ef">
    <text x="80" y="200" font-size="92" font-weight="700" letter-spacing="-2">Briefly</text>
    <text x="80" y="280" font-size="40" font-weight="500" fill="#b6c0d4">Speech in. Text out.</text>
    <text x="80" y="328" font-size="40" font-weight="500" fill="#b6c0d4">(And back.)</text>

    <text x="80" y="430" font-size="22" fill="#8a93a3">A clean, multi-provider Chrome side panel for</text>
    <text x="80" y="460" font-size="22" fill="#8a93a3">speech-to-text and text-to-speech.</text>

    <!-- feature pills -->
    <g font-size="18" font-weight="500">
      <g transform="translate(80,520)">
        <rect width="220" height="40" rx="20" fill="#1e242d" stroke="#2a3140"/>
        <text x="20" y="26" fill="#e6e9ef">🎙 Live streaming STT</text>
      </g>
      <g transform="translate(310,520)">
        <rect width="180" height="40" rx="20" fill="#1e242d" stroke="#2a3140"/>
        <text x="20" y="26" fill="#e6e9ef">🔊 5 TTS voices</text>
      </g>
      <g transform="translate(80,575)">
        <rect width="200" height="40" rx="20" fill="#1e242d" stroke="#2a3140"/>
        <text x="20" y="26" fill="#e6e9ef">🌐 Auto-translate → EN</text>
      </g>
      <g transform="translate(290,575)">
        <rect width="180" height="40" rx="20" fill="#1e242d" stroke="#2a3140"/>
        <text x="20" y="26" fill="#e6e9ef">⚡ Free tier ready</text>
      </g>
    </g>

    <!-- provider strip -->
    <text x="80" y="680" font-size="14" fill="#777e8d" letter-spacing="3">POWERED BY</text>
    <g font-size="16" font-weight="600" fill="#b6c0d4" transform="translate(80, 715)">
      <text>Web Speech · Groq · Deepgram · AssemblyAI · OpenAI · ElevenLabs</text>
    </g>
  </g>

  <!-- right: side panel mockup -->
  <g transform="translate(740, 80)">
    <rect width="460" height="640" rx="16" fill="#161a21" stroke="#2a3140" stroke-width="1"/>
    <!-- topbar -->
    <rect width="460" height="50" rx="16" fill="#1e242d"/>
    <rect y="34" width="460" height="16" fill="#1e242d"/>
    <text x="20" y="32" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#e6e9ef">Briefly</text>
    <text x="408" y="32" font-size="14" fill="#8a93a3">⚙</text>

    <!-- tabs -->
    <rect y="50" width="460" height="40" fill="#161a21" stroke="#2a3140" stroke-width="0.5"/>
    <text x="100" y="76" font-size="14" font-weight="500" fill="#e6e9ef">Speech → Text</text>
    <text x="280" y="76" font-size="14" fill="#8a93a3">Text → Speech</text>
    <rect x="40" y="88" width="180" height="2" fill="url(#accent)"/>

    <!-- provider dropdown -->
    <text x="20" y="120" font-size="10" letter-spacing="1" fill="#8a93a3">PROVIDER</text>
    <rect x="20" y="128" width="420" height="36" rx="6" fill="#161a21" stroke="#2a3140"/>
    <text x="34" y="152" font-size="14" fill="#e6e9ef">Deepgram</text>
    <text x="418" y="152" font-size="12" fill="#8a93a3">▾</text>

    <!-- live checkbox -->
    <rect x="20" y="180" width="14" height="14" rx="3" fill="#4f7cff"/>
    <text x="44" y="192" font-size="13" fill="#e6e9ef">Live streaming — see words as you speak</text>

    <!-- waveform -->
    <rect x="20" y="218" width="420" height="60" rx="6" fill="#0f1115" stroke="#2a3140"/>
    <g fill="#4f7cff">
      <!-- bars -->
      <rect x="30" y="248" width="6" height="10"/>
      <rect x="40" y="240" width="6" height="26"/>
      <rect x="50" y="230" width="6" height="46"/>
      <rect x="60" y="244" width="6" height="18"/>
      <rect x="70" y="226" width="6" height="54"/>
      <rect x="80" y="234" width="6" height="38"/>
      <rect x="90" y="220" width="6" height="66"/>
      <rect x="100" y="232" width="6" height="42"/>
      <rect x="110" y="244" width="6" height="18"/>
      <rect x="120" y="228" width="6" height="50"/>
      <rect x="130" y="222" width="6" height="62"/>
      <rect x="140" y="236" width="6" height="34"/>
      <rect x="150" y="246" width="6" height="14"/>
      <rect x="160" y="232" width="6" height="42"/>
      <rect x="170" y="240" width="6" height="26"/>
      <rect x="180" y="226" width="6" height="54"/>
      <rect x="190" y="234" width="6" height="38"/>
      <rect x="200" y="248" width="6" height="10"/>
      <rect x="210" y="244" width="6" height="18"/>
      <rect x="220" y="232" width="6" height="42"/>
      <rect x="230" y="226" width="6" height="54"/>
      <rect x="240" y="240" width="6" height="26"/>
      <rect x="250" y="238" width="6" height="30"/>
      <rect x="260" y="228" width="6" height="50"/>
      <rect x="270" y="246" width="6" height="14"/>
      <rect x="280" y="232" width="6" height="42"/>
      <rect x="290" y="244" width="6" height="18"/>
      <rect x="300" y="240" width="6" height="26"/>
      <rect x="310" y="238" width="6" height="30"/>
      <rect x="320" y="246" width="6" height="14"/>
      <rect x="330" y="244" width="6" height="18"/>
    </g>

    <!-- record button -->
    <rect x="20" y="292" width="170" height="38" rx="8" fill="#e25555"/>
    <text x="48" y="316" font-size="14" font-weight="500" fill="#ffffff">⏹ Stop recording</text>
    <text x="208" y="316" font-size="12" fill="#3ec28f">Live · listening…</text>

    <!-- transcript -->
    <text x="20" y="360" font-size="10" letter-spacing="1" fill="#8a93a3">TRANSCRIPT</text>
    <rect x="20" y="368" width="420" height="220" rx="6" fill="#0f1115" stroke="#2a3140"/>
    <g font-size="13" fill="#e6e9ef" font-family="-apple-system, sans-serif">
      <text x="34" y="392">The fastest way to turn what you say into</text>
      <text x="34" y="412">structured text, and the cleanest way to listen</text>
      <text x="34" y="432">to anything you write — straight from the browser.</text>
      <text x="34" y="466" fill="#8a93a3">Pick a free provider, paste an API key for</text>
      <text x="34" y="486" fill="#8a93a3">premium voices, and start recording…</text>
    </g>

    <!-- buttons -->
    <g transform="translate(20, 600)">
      <rect width="60" height="30" rx="6" stroke="#2a3140" fill="transparent"/>
      <text x="20" y="20" font-size="12" fill="#e6e9ef">Copy</text>
      <rect x="70" width="60" height="30" rx="6" stroke="#2a3140" fill="transparent"/>
      <text x="86" y="20" font-size="12" fill="#e6e9ef">Clear</text>
      <rect x="140" width="100" height="30" rx="6" stroke="#2a3140" fill="transparent"/>
      <text x="158" y="20" font-size="12" fill="#e6e9ef">↓ Recording</text>
      <rect x="250" width="90" height="30" rx="6" stroke="#2a3140" fill="transparent"/>
      <text x="262" y="20" font-size="12" fill="#e6e9ef">➡ Send to tab</text>
    </g>
  </g>
</svg>
